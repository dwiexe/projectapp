kind = "mobile"
previewPath = "/"
title = "PPOB App"
version = "1.0.0"
id = "artifacts/ppob-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22635

[services.development]
run = "pnpm --filter @workspace/ppob-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ppob-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ppob-app", "run", "serve" ]

[services.env]
PORT = "22635"
BASE_PATH = "/"
